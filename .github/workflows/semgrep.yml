name: Semgrep-SAST

on:
  pull_request:
    branches: [ "master" ]

jobs:
  semgrep-scan:
    name: Escaneo de Codigo
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Ejecutar Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-10 # Reglas estrictas enfocadas en el Top 10 de OWASP
